<!DOCTYPE html>
<html lang="fr">
  <head>
    <!-- Métadonnées de base -->
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>QVT Box – La santé mentale en entreprise et en famille</title>
    <meta
      name="description"
      content="L'IA française au service de la santé mentale au travail et en famille, parce que la communication et l'attention sont les clés du bonheur."
    />

    <!-- Base href pour que tous les assets relatifs fonctionnent -->
    <base href="/" />

    <!-- Open Graph / Twitter -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://qvtbox.com" />
    <meta property="og:title"       content="QVT Box – Santé mentale et bien-être" />
    <meta property="og:description" content="L'IA française au service de la santé mentale au travail et en famille." />
    <meta property="og:image"       content="/social-preview.png" />
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:url"        content="https://qvtbox.com" />
    <meta name="twitter:title"      content="QVT Box – Santé mentale et bien-être" />
    <meta name="twitter:description" content="L'IA française au service de la santé mentale au travail et en famille." />
    <meta name="twitter:image"      content="/social-preview.png" />

    <!-- Favicons & PWA manifest -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon"               href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link rel="icon"               href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link rel="manifest"           href="/site.webmanifest" />
    <meta name="theme-color"       content="#FFFFFF" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Votre CSS principal (dev ou prod) -->
    <link rel="stylesheet" href="/src/index.css" />
  </head>

  <body>
    <noscript>JavaScript est nécessaire pour voir cette application.</noscript>
    <div id="root"></div>

    <!-- Script externe -->
    <script src="https://cdn.gpteng.co/gptengineer.js" type="module"></script>

    <!-- Entrée React (sera remplacé en prod par /assets/index.[hash].js) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
